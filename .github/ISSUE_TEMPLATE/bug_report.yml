name: Bug report
description: Something misbehaves in the firmware or web UI
labels: ["bug"]
body:
  - type: textarea
    id: what
    attributes:
      label: What happened
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: What you expected instead
  - type: textarea
    id: repro
    attributes:
      label: Steps to reproduce
  - type: textarea
    id: logs
    attributes:
      label: Serial log (@115200)
      description: Paste the relevant lines — [wifi], [tx-tune], Midea UART, etc.
      render: text
  - type: input
    id: build
    attributes:
      label: Build info
      placeholder: git commit or release tag; how you flashed (source / prebuilt / web flasher)
