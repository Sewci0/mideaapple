; mideaapple — native HomeKit firmware for a Midea air conditioner, on ESP32-C3.
;   HomeSpan            -> HomeKit Accessory Protocol (pairing, mDNS, HeaterCooler)
;   dudanov/MideaUART   -> the AC's UART "WiFi dongle" protocol (what ESPHome's
;                          `midea` climate component wraps under the hood)
;
; Flash:   pio run -t upload && pio device monitor
; Pair:    Home app -> Add Accessory -> "More options" -> code 466-37-726

[env:esp32-c3-devkitm-1]
platform      = espressif32
board         = esp32-c3-devkitm-1   ; small board, fits the AC bay; low avg draw
framework     = arduino
monitor_speed = 115200
upload_speed  = 921600
board_build.partitions = min_spiffs.csv   ; 1.9MB app x2 (OTA) — room for the web UI

lib_deps =
    ; HomeSpan 2.x needs arduino-esp32 core >=3.3.0; the official PlatformIO
    ; espressif32 platform ships core 2.0.17, so pin the last 1.x HomeSpan.
    ; Upgrade path: switch `platform` to the pioarduino fork (core 3.x) + HomeSpan 2.x.
    homespan/HomeSpan@1.9.1
    https://github.com/dudanov/MideaUART.git

build_flags =
    -std=gnu++17
    ; AC UART on UART1 (C3 has no fixed Serial2). Safe pins: not strapping
    ; (2/8/9), not USB-JTAG (18/19), not console UART0 (20/21).
    -D MIDEA_RX_PIN=4    ; ESP32-C3 in  <- AC TX
    -D MIDEA_TX_PIN=5    ; ESP32-C3 out -> AC RX
    ; log over the C3's native USB when on the bench
    -D ARDUINO_USB_MODE=1
    -D ARDUINO_USB_CDC_ON_BOOT=1
